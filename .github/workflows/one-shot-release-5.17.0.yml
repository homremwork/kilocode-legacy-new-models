name: One-shot release 5.17.0

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-release-5.17.0.yml

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Bump version
        run: |
          node -e "const fs=require('fs'); const p='src/package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); if(j.version!=='5.16.2') throw new Error('Expected 5.16.2, found '+j.version); j.version='5.17.0'; fs.writeFileSync(p, JSON.stringify(j,null,'\t')+'\n');"

      - name: Update changelog
        run: |
          if ! grep -q '^## 5\.17\.0$' CHANGELOG.md; then
            printf '%s\n' \
              '## 5.17.0' \
              '' \
              '### Added' \
              '' \
              '- Added GPT-5.6 Sol, Terra, and Luna models to the OpenAI Codex provider.' \
              '- Added `max` and `ultra` reasoning effort options for supported GPT-5.6 models.' \
              '' \
              '### Fixed' \
              '' \
              "- Increased usable OpenAI Codex context to the full 90% context-management budget instead of reserving the model's entire maximum output capability." \
              '' | cat - CHANGELOG.md > CHANGELOG.md.new
            mv CHANGELOG.md.new CHANGELOG.md
          fi

      - name: Commit release metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/one-shot-release-5.17.0.yml
          git add src/package.json CHANGELOG.md .github/workflows/one-shot-release-5.17.0.yml
          git commit -m "chore: release 5.17.0"
          git push origin main

      - name: Trigger Publish Extension
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run marketplace-publish.yml --ref main
