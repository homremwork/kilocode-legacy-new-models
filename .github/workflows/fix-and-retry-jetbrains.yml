name: Fix and retry JetBrains publish

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-and-retry-jetbrains.yml

permissions:
  contents: write
  actions: write

jobs:
  fix-and-retry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Authenticate JetBrains Runtime lookup
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/marketplace-publish.yml')
          text = path.read_text()
          old = '''            - uses: actions/setup-java@v5
              with:
                  distribution: "jetbrains"
'''
          new = '''            - uses: actions/setup-java@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  distribution: "jetbrains"
'''
          if old not in text:
              raise SystemExit('setup-java JetBrains block not found')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Commit fix and remove helper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/fix-and-retry-jetbrains.yml
          git add .github/workflows/marketplace-publish.yml .github/workflows/fix-and-retry-jetbrains.yml
          git commit -m "ci: authenticate JetBrains Runtime release lookup"
          git push origin main

      - name: Retry Publish Extension
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run marketplace-publish.yml --ref main
